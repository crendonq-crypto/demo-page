# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

resources:
- repo: self

variables:
  - group: CICD
  - name: appVersion
    value: $[variables.appVersion]

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: "demo-page"

stages:
- stage: CICD
  displayName: CICD workflow
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
      - script: |
          echo 'var=$(appVersion)'
        displayName: Comprobar la variable

      - task: Docker@2
        displayName: Build an image
        inputs:
          repository: ${{ parameters.imageName }}
          command: build
          dockerfile: '**/Dockerfile'
          tags: ${{ parameters.tag }}
          arguments: '--build-arg VERSION=$(appVersion)'
          containerRegistry: 'registryConnection'

      - task: Docker@2
        displayName: Push to ACR
        inputs:
          command: push
          containerRegistry: 'registryConnection' 
          repository: ${{ parameters.imageName }}
          tags: ${{ parameters.tag }}

  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1
        inputs:
          azureSubscription: 'appDeployConnection'
          imageToBuild: ACRAPPSCAROLINA.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}
          containerAppName: app-demo-page
          resourceGroup: RG-jenkinsCaro
          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)