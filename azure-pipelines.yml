  - main

resources:
  - repo: self

variables:
- group: CICD  # Aquí dentro viven tus secretos: acrUsername, acrPassword y appVersion

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: "demo-page"

stages:
- stage: CICD
  displayName: "Flujo Completo CI/CD"
  jobs:
  - job: BuildAndDeploy
    displayName: "Build, Push & Deploy"
    pool: local-agent
    steps:
      - script: |
          echo "La version configurada es: $(appVersion)"
          echo "Construyendo el tag: ${{ parameters.tag }}"
        displayName: "Comprobar Variables Iniciales"

      # === PASO 1: CONSTRUIR LA IMAGEN DOCKER ===
      - task: Docker@2
        displayName: "Build Docker Image"
        inputs:
          containerRegistry: 'registryConnection' # Usa el nombre de tu Service Connection
          repository: ${{ parameters.imageName }}
          command: 'build'
          dockerfile: '**/Dockerfile'
          tags: ${{ parameters.tag }}
          arguments: '--build-arg VERSION=$(appVersion)' # Le pasa la versión a tu Dockerfile

      # === PASO 2: SUBIR LA IMAGEN AL ACR (¡El que faltaba!) ===
      - task: Docker@2
        displayName: "Push Docker Image to ACR"
        inputs:
          containerRegistry: 'registryConnection' # Mismo Service Connection
          repository: ${{ parameters.imageName }}
          command: 'push'
          tags: ${{ parameters.tag }}

      # === PASO 3: DESPLEGAR EN AZURE CONTAINER APPS ===
      - task: AzureContainerApps@1
        displayName: "Deploy to Azure Container App"
        inputs:
          azureSubscription: 'appDeployConnection'
          # Reemplaza ACRAPPSCAROLINA si tu login server real es diferente en minúsculas
          imageToDeploy: 'acrappscarolina.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}'
          containerAppName: 'app-demo-page'
          resourceGroup: 'RG-jenkinsCaro'
          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)